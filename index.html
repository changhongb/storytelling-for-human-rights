<!DOCTYPE html>
    <html> 
        <head>
            <link rel="preconnect" href="https://googleapis.com">
            <link rel="preconnect" href="https://gstatic.com" crossorigin>
            <link href="https://googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
            <meta charset="UTF-8">
            <title> SMG Interactive </title>
            <style>
                body {
                    margin: 0;
                    background-color: white;
                    font-family: 'Times New Roman', Times, serif;
                    color: grey;

                    justify-content: center;

                    min-height: 100vh;
                }
                
                #title {
                    color: grey;
                    font-size: 3rem;
                    font-family: "Great Vibes", cursive;

                    letter-spacing: 0.5px;
                    text-align: center;
                    margin-top: 100px;
                    margin-bottom: 30px;
                }

                .text-content {
                    max-width: 600px;
                    margin: 0 auto;
                    line-height: 1.6;
                    text-align: center;
                }

                .interactive {
                    display: flex;
                }

                .tile {
                    position: absolute;

                    width: 100px;
                    height: 100px;

                    overflow: visible;

                    transition:
                        transform 0.25s ease,
                        box-shadow 0.25s ease;
   
                    z-index: 1;
                }

                .tile img {
                    width: 100%;
                    height: 100%;
                }
            </style>
        </head>
    <body>
        <h1 id="title"> Storytelling for Migrant Justice </h1>

        <div class="content-block">
            <p>
                Over 200 people are currently detained in the Northwest Ice Processing Center.
            </p>
            <p>
                These are some of their stories. 
            </p>
        </div>

        <div id="interactive"></div>
    </body>

    </html>
